version: "2"
run:
  modules-download-mode: readonly
  tests: false
  allow-parallel-runners: true
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - godoclint
    - modernize
    - noinlineerr
    - ireturn
    - lll
    - maintidx
    - mnd
    - musttag
    - nilnil
    - nlreturn
    - perfsprint
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    lll:
      line-length: 100
    revive:
      confidence: 0.8
      severity: error
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: confusing-results
        - name: function-length
          disabled: true
        - name: line-length-limit
          arguments:
            - 132
        - name: max-public-structs
          disabled: true
        - name: package-comments
          disabled: true
        - name: package-naming
          disabled: true
        - name: struct-tag
          arguments:
            - json,allowempty
        - name: unhandled-error
          arguments:
            - fmt.Fprint
            - fmt.Fprintf
    staticcheck:
      checks:
        - all
        - -ST1000
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - ^examples/
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - ^examples/
